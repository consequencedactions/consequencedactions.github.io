baseURL = 'https://consequencedactions.com/'
locale = 'pt-pt'
title = 'consequencedactions'
theme = "PaperMod"

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "Archive"
url = "/archives/"
weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
  
[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]